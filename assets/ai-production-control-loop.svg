<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI production control loop</title>
  <desc id="desc">A control loop from creative or product intent through source selection, bounded handoff, verification, retake, and lesson writeback.</desc>
  <rect width="1200" height="420" rx="28" fill="#f8fafc"/>
  <rect x="36" y="36" width="1128" height="348" rx="22" fill="#ffffff" stroke="#d7dde5" stroke-width="2"/>

  <text x="70" y="91" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">AI production control loop</text>
  <text x="70" y="126" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">From creative intent to reviewable artifacts, with explicit boundaries at every handoff.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="70" y="180" width="150" height="96" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="145" y="218" text-anchor="middle" fill="#164e63" font-size="18" font-weight="700">Intent</text>
    <text x="145" y="248" text-anchor="middle" fill="#155e75" font-size="14">brief / goal</text>

    <rect x="276" y="180" width="180" height="96" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="366" y="213" text-anchor="middle" fill="#14532d" font-size="17" font-weight="700">Select</text>
    <text x="366" y="242" text-anchor="middle" fill="#166534" font-size="14">sources / tools</text>
    <text x="366" y="263" text-anchor="middle" fill="#166534" font-size="14">method path</text>

    <rect x="512" y="180" width="180" height="96" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="602" y="213" text-anchor="middle" fill="#78350f" font-size="17" font-weight="700">Handoff</text>
    <text x="602" y="242" text-anchor="middle" fill="#92400e" font-size="14">agent / crew</text>
    <text x="602" y="263" text-anchor="middle" fill="#92400e" font-size="14">bounded work</text>

    <rect x="748" y="180" width="180" height="96" rx="18" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="838" y="213" text-anchor="middle" fill="#4c1d95" font-size="17" font-weight="700">Review</text>
    <text x="838" y="242" text-anchor="middle" fill="#5b21b6" font-size="14">artifact / taste</text>
    <text x="838" y="263" text-anchor="middle" fill="#5b21b6" font-size="14">retake gates</text>

    <rect x="984" y="180" width="146" height="96" rx="18" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="1057" y="213" text-anchor="middle" fill="#881337" font-size="17" font-weight="700">Writeback</text>
    <text x="1057" y="242" text-anchor="middle" fill="#9f1239" font-size="14">lessons</text>
    <text x="1057" y="263" text-anchor="middle" fill="#9f1239" font-size="14">route memory</text>

    <path d="M230 228H266" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <path d="M260 220L270 228L260 236" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M466 228H502" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <path d="M496 220L506 228L496 236" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M702 228H738" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <path d="M732 220L742 228L732 236" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M938 228H974" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <path d="M968 220L978 228L968 236" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x="70" y="314" width="1060" height="40" rx="20" fill="#f1f5f9"/>
  <text x="600" y="340" text-anchor="middle" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Boundary: control methods route candidates; project owners keep runtime truth.</text>
</svg>
